apiVersion: 1

providers:
  - name: failover-analysis
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/failover-analysis
      foldersFromFilesStructure: true

  - name: infrastructure-metrics
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/infrastructure-metrics
      foldersFromFilesStructure: true

! FRR configuration — combination 05 BGP Anycast router
! AS 65000 peers with three ExaBGP speakers (AS 65001, one per Patroni node).
!
! Proxy ARP is enabled via sysctl (net.ipv4.conf.all.proxy_arp=1) in
! docker-compose.yml rather than per-interface here, because Docker may assign
! the bench interface a name other than eth0 on some platforms.
!
! When a Patroni node becomes primary its ExaBGP announces:
!   172.32.0.100/32 next-hop <node_ip>
! FRR installs the kernel route and starts proxy-ARPing for 172.32.0.100.
! Clients on the bench network ARP for the VIP, receive FRR's MAC, and their
! packets are forwarded to the current leader.
!
! BGP hold-time 10 s (3 s keepalive): FRR detects a dead ExaBGP session and
! withdraws the route within 10 s of the node crashing.

frr defaults traditional
hostname frr
log stdout
no ipv6 forwarding

router bgp 65000
 bgp router-id 172.32.0.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 neighbor 172.32.0.11 remote-as 65001
 neighbor 172.32.0.11 timers 3 10
 neighbor 172.32.0.11 description patroni-node1
 !
 neighbor 172.32.0.12 remote-as 65001
 neighbor 172.32.0.12 timers 3 10
 neighbor 172.32.0.12 description patroni-node2
 !
 neighbor 172.32.0.13 remote-as 65001
 neighbor 172.32.0.13 timers 3 10
 neighbor 172.32.0.13 description patroni-node3
 !
 address-family ipv4 unicast
  neighbor 172.32.0.11 activate
  neighbor 172.32.0.12 activate
  neighbor 172.32.0.13 activate
 exit-address-family
!
line vty

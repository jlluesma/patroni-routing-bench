# ExaBGP configuration — patroni-node1
# eBGP session to FRR router (AS 65000). Sends route announcements written
# to the FIFO at /run/exabgp/exabgp.cmd by bgp_callback.sh.

process service {
    run /etc/exabgp/exabgp-run.sh;
    encoder text;
}

neighbor 172.32.0.1 {
    router-id 172.32.0.11;
    local-address 172.32.0.11;
    local-as 65001;
    peer-as 65000;
    hold-time 10;

    family {
        ipv4 unicast;
    }

    api {
        processes [service];
    }
}

###############################################################################
# patroni-routing-bench: HAProxy Configuration
# Combination 09 — Patroni Callback → HAProxy Runtime API
#
# Two Runtime API endpoints:
#   Unix socket: /var/run/haproxy/admin.sock  — for local docker exec access
#   TCP socket:  *:9999                        — for cross-container callbacks
#
# The TCP stats socket on port 9999 is accessible to all containers on the
# prb-09-bench network. It is NOT exposed to the host (no ports: entry).
# The Patroni haproxy_callback.sh connects to haproxy:9999 using Python's
# socket module (curl cannot speak the HAProxy Runtime API wire protocol).
#
# HAProxy health checks (httpchk GET /primary) still run on servers in
# "ready" state and provide a second validation layer: the callback sets the
# state, health checks confirm the node is actually accepting writes.
###############################################################################

global
    maxconn 1000
    log stdout format raw local0
    stats socket /var/run/haproxy/admin.sock mode 660 level admin
    stats socket ipv4@*:9999 level admin

defaults
    mode tcp
    log global
    option log-health-checks
    retries 3
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout check 2s

# ---------------------------------------------------------------------------
# Stats & Prometheus endpoint
# ---------------------------------------------------------------------------
frontend stats
    bind *:8404
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends

# ---------------------------------------------------------------------------
# Primary (read-write) — port 5000
# Callback sets state ready/maint; httpchk provides secondary validation.
# ---------------------------------------------------------------------------
frontend primary_frontend
    bind *:5000
    default_backend primary_backend

backend primary_backend
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions

    server patroni-node1 patroni-node1:5432 check port 8008
    server patroni-node2 patroni-node2:5432 check port 8008
    server patroni-node3 patroni-node3:5432 check port 8008

# ---------------------------------------------------------------------------
# Replicas (read-only) — port 5001
# Callback does not manage replica_backend; HAProxy's /replica checks drive it.
# ---------------------------------------------------------------------------
frontend replica_frontend
    bind *:5001
    default_backend replica_backend

backend replica_backend
    option httpchk GET /replica
    http-check expect status 200
    balance roundrobin
    default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions

    server patroni-node1 patroni-node1:5432 check port 8008
    server patroni-node2 patroni-node2:5432 check port 8008
    server patroni-node3 patroni-node3:5432 check port 8008

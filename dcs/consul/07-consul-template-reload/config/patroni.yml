###############################################################################
# patroni-routing-bench: Patroni Configuration
# Combination 07 — consul-template HAProxy Reload
#
# Identical to combo 06. Patroni's role here is purely DCS — the routing
# layer is managed by consul-template watching the Consul service catalog.
###############################################################################

scope: bench
namespace: /service/

restapi:
  listen: 0.0.0.0:8008

consul:
  host: consul-server:8500
  register_service: true

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576  # 1MB
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 10
        max_replication_slots: 10
        wal_log_hints: "on"
        logging_collector: "on"
        log_directory: /var/log/postgresql
        log_filename: postgresql.log
        log_line_prefix: "%m [%p] %q%u@%d "
        log_statement: none
        log_min_duration_statement: 1000
        log_connections: "on"
        log_disconnections: "on"
        log_replication_commands: "on"
        log_checkpoints: "on"
        log_min_messages: info
        log_file_mode: "0644"

  initdb:
    - encoding: UTF8
    - data-checksums

  pg_hba:
    - host replication replicator 0.0.0.0/0 md5
    - host all all 0.0.0.0/0 md5

postgresql:
  listen: 0.0.0.0:5432
  data_dir: /var/lib/postgresql/18/docker
  pgpass: /tmp/pgpass0
  authentication:
    superuser:
      username: postgres
      password: postgres
    replication:
      username: replicator
      password: replicator
    rewind:
      username: rewind
      password: rewind
  parameters:
    unix_socket_directories: /var/run/postgresql
  pg_hba:
    - host replication replicator 0.0.0.0/0 md5
    - host all all 0.0.0.0/0 md5

tags:
  nofailover: false
  noloadbalancer: false
  clonefrom: false
  nosync: false

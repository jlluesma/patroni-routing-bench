###############################################################################
# patroni-routing-bench: Combination 06 — HAProxy REST Polling (Baseline)
#
# Architecture:
#   3x Patroni/PostgreSQL nodes (1 primary + 2 replicas)
#   1x Consul server (DCS)
#   1x HAProxy (routing via REST health checks on /primary and /replica)
#   1x Client (heartbeat traffic generator)
#   5x Observer agents (one per component type)
#   Exporters: node_exporter on every node, postgres_exporter, consul_exporter
#
# The dashboard stack (TimescaleDB + Prometheus + Grafana) runs separately.
# Start it first: cd ../../dashboard && docker compose up -d
#
# Usage:
#   docker compose up -d                     # default observer poll = 100ms
#   POLL_INTERVAL_MS=50 docker compose up -d # override for a 50ms test
#
# Observer poll interval: adjust POLL_INTERVAL_MS to change
# measurement precision. Tested values: 50ms, 100ms, 200ms
#
# Ports:
#   HAProxy primary:  localhost:5000
#   HAProxy replicas: localhost:5001
#   HAProxy stats:    localhost:8404/stats
#   Consul UI:        localhost:8500
###############################################################################

x-patroni-common: &patroni-common
  build:
    context: ../../../shared/docker/postgres-patroni
  environment: &patroni-env
    CONSUL_HOST: consul-server
    CONSUL_PORT: "8500"
    PATRONI_CONFIG: /etc/patroni/patroni.yml
  volumes:
    - ./config/patroni.yml:/etc/patroni/patroni.yml:ro
    # pg_logs volume is overridden per node to share PG logs with observer
  depends_on:
    consul-server:
      condition: service_healthy

x-observer-common: &observer-common
  build:
    context: ../../../tool/observers
  # Shared env for all observer services. Merge with `<<: *observer-env`
  # inside each service's `environment:` block to pick up POLL_INTERVAL_MS.
  environment: &observer-env
    POLL_INTERVAL_MS: "${POLL_INTERVAL_MS:-100}"

x-node-exporter: &node-exporter
  image: prom/node-exporter:latest
  pid: "service:patroni-node1"  # overridden per service
  command:
    - "--path.rootfs=/host"
    - "--web.listen-address=:9100"

services:

  # ===========================================================================
  # DCS: Consul Server
  # ===========================================================================
  consul-server:
    image: hashicorp/consul:latest
    container_name: prb-06t-consul
    command: agent -server -config-file=/consul/config/consul.json -bind='{{ GetInterfaceIP "eth0" }}'
    volumes:
      - ./config/consul.json:/consul/config/consul.json:ro
      - consul_data:/consul/data
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bench
      - dashboard

  consul-exporter:
    image: prom/consul-exporter:latest
    container_name: prb-06t-consul-exporter
    command:
      - "--consul.server=http://consul-server:8500"
    depends_on:
      consul-server:
        condition: service_healthy
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # Patroni/PostgreSQL Nodes
  # ===========================================================================
  patroni-node1:
    <<: *patroni-common
    container_name: prb-06t-node1
    hostname: patroni-node1
    environment:
      <<: *patroni-env
      PATRONI_NAME: patroni-node1
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-node1:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-node1:5432
    volumes:
      - ./config/patroni.yml:/etc/patroni/patroni.yml:ro
      - pg_logs_node1:/var/log/postgresql
    networks:
      - bench
      - dashboard

  patroni-node2:
    <<: *patroni-common
    container_name: prb-06t-node2
    hostname: patroni-node2
    environment:
      <<: *patroni-env
      PATRONI_NAME: patroni-node2
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-node2:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-node2:5432
    volumes:
      - ./config/patroni.yml:/etc/patroni/patroni.yml:ro
      - pg_logs_node2:/var/log/postgresql
    networks:
      - bench
      - dashboard

  patroni-node3:
    <<: *patroni-common
    container_name: prb-06t-node3
    hostname: patroni-node3
    environment:
      <<: *patroni-env
      PATRONI_NAME: patroni-node3
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-node3:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-node3:5432
    volumes:
      - ./config/patroni.yml:/etc/patroni/patroni.yml:ro
      - pg_logs_node3:/var/log/postgresql
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # PostgreSQL Exporter (scrapes all 3 nodes)
  # ===========================================================================
  postgres-exporter-node1:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: prb-06t-pgexp1
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@patroni-node1:5432/postgres?sslmode=disable"
    depends_on:
      - patroni-node1
    networks:
      - bench
      - dashboard

  postgres-exporter-node2:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: prb-06t-pgexp2
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@patroni-node2:5432/postgres?sslmode=disable"
    depends_on:
      - patroni-node2
    networks:
      - bench
      - dashboard

  postgres-exporter-node3:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: prb-06t-pgexp3
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@patroni-node3:5432/postgres?sslmode=disable"
    depends_on:
      - patroni-node3
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # Routing: HAProxy
  # ===========================================================================
  haproxy:
    image: haproxy:latest
    container_name: prb-06t-haproxy
    user: root
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - haproxy_run:/var/run/haproxy
    ports:
      - "5000:5000"
      - "5001:5001"
      - "8404:8404"
    depends_on:
      - patroni-node1
      - patroni-node2
      - patroni-node3
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # Client: Heartbeat Traffic Generator
  # ===========================================================================
  client:
    build:
      context: ../../../tool/clients/failover
    container_name: prb-06t-client
    environment:
      PG_CONNSTRING: "host=haproxy port=5000 dbname=postgres user=postgres password=postgres connect_timeout=5"
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "06-haproxy-rest-polling-tuned"
      TEST_RUN_ID: ""  # Set by runner script
      INTERVAL_MS: "100"
    depends_on:
      - haproxy
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # Observer Agents (one per component)
  # ===========================================================================
  # Single container watches all 3 Patroni REST APIs concurrently.
  # WATCHER_TARGETS drives one thread per node; each thread emits events with
  # its own node name (e.g. "patroni-node1") so existing charts are unaffected.
  observer-patroni:
    build:
      context: ../../../tool/observers
    container_name: prb-06t-obs-patroni
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: patroni
      WATCHER_TARGETS: "patroni-node1:http://patroni-node1:8008,patroni-node2:http://patroni-node2:8008,patroni-node3:http://patroni-node3:8008"
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "06-haproxy-rest-polling-tuned"
    depends_on:
      - patroni-node1
      - patroni-node2
      - patroni-node3
    networks:
      - bench
      - dashboard

  observer-consul:
    build:
      context: ../../../tool/observers
    container_name: prb-06t-obs-consul
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: consul
      CONSUL_URL: http://consul-server:8500
      CONSUL_SCOPE: bench
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "06-haproxy-rest-polling-tuned"
      NODE_NAME: consul-server
    depends_on:
      consul-server:
        condition: service_healthy
    networks:
      - bench
      - dashboard

  observer-haproxy:
    build:
      context: ../../../tool/observers
    container_name: prb-06t-obs-haproxy
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: haproxy
      HAPROXY_STATS_URL: "http://haproxy:8404/stats;csv"
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "06-haproxy-rest-polling-tuned"
      NODE_NAME: haproxy
    depends_on:
      - haproxy
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # Observer Agent: PostgreSQL log watcher (all 3 nodes in one process)
  # Three pg_logs volumes are mounted at distinct paths so WATCHER_TARGETS
  # can point each per-node thread at its own log file.
  # ===========================================================================
  observer-postgres:
    build:
      context: ../../../tool/observers
    container_name: prb-06t-obs-pg
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: postgres
      WATCHER_TARGETS: "patroni-node1:host=patroni-node1 port=5432 dbname=postgres user=postgres password=postgres,patroni-node2:host=patroni-node2 port=5432 dbname=postgres user=postgres password=postgres,patroni-node3:host=patroni-node3 port=5432 dbname=postgres user=postgres password=postgres"
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "06-haproxy-rest-polling-tuned"
    depends_on:
      - patroni-node1
      - patroni-node2
      - patroni-node3
    networks:
      - bench
      - dashboard

volumes:
  consul_data:
  haproxy_run:
  pg_logs_node1:
  pg_logs_node2:
  pg_logs_node3:

networks:
  bench:
    name: prb-06t-bench
  dashboard:
    external: true
    name: prb-dashboard

###############################################################################
# patroni-routing-bench: Combination 04 — vip-manager Callback
#
# Architecture:
#   3x Patroni/PostgreSQL nodes (1 primary + 2 replicas)
#   1x Consul server (DCS only)
#   1x Client (connects directly to VIP 172.31.0.100:5432)
#   5x Observer agents (patroni ×1, pg ×1, consul ×1, vip ×3)
#
# Routing mechanism: floating VIP via Patroni on_role_change callback
#   - No vip-manager polling process — Patroni calls vip_callback.sh directly
#   - When Patroni promotes a node to primary, it runs the callback with
#     ROLE=primary, which immediately binds 172.31.0.100/24 to eth0
#   - When Patroni demotes a node, it runs the callback with ROLE=replica,
#     which removes the VIP from eth0
#   - arping sends a gratuitous ARP to flush ARP caches on the bench network
#
# Key difference vs combo 03 (polling):
#   - Combo 03: vip-manager polls Consul KV every 1 s → up to 1 s extra lag
#   - Combo 04: Patroni fires the callback synchronously → near-zero extra lag
#
# Patroni nodes require NET_ADMIN capability to run `ip addr add/del`.
# The vip_callback.sh script is mounted into each patroni container.
# If `arping` is not installed in the patroni image, the GARP step is skipped
# silently (|| true) — the VIP still binds correctly.
#
# The dashboard stack (TimescaleDB + Prometheus + Grafana) runs separately.
# Start it first: cd ../../../dashboard && docker compose up -d
#
# Usage:
#   docker compose up -d                     # default observer poll = 100ms
#   POLL_INTERVAL_MS=50 docker compose up -d # finer resolution
#
# Ports:
#   Consul UI: localhost:8504  (offset to allow parallel runs with 01/02/03/06)
###############################################################################

x-patroni-common: &patroni-common
  build:
    context: ../../../shared/docker/postgres-patroni
  environment: &patroni-env
    CONSUL_HOST: consul-server
    CONSUL_PORT: "8500"
    PATRONI_CONFIG: /etc/patroni/patroni.yml
  cap_add:
    - NET_ADMIN
  depends_on:
    consul-server:
      condition: service_healthy

x-observer-common: &observer-common
  build:
    context: ../../../tool/observers
  environment: &observer-env
    POLL_INTERVAL_MS: "${POLL_INTERVAL_MS:-100}"

services:

  # ===========================================================================
  # DCS: Consul Server
  # ===========================================================================
  consul-server:
    image: hashicorp/consul:latest
    container_name: prb-04-consul
    command: agent -server -config-file=/consul/config/consul.json -bind='{{ GetInterfaceIP "eth0" }}'
    volumes:
      - ./config/consul.json:/consul/config/consul.json:ro
      - consul_data:/consul/data
    ports:
      - "8504:8500"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # Patroni/PostgreSQL Nodes
  # NET_ADMIN is required for `ip addr add/del` in vip_callback.sh
  # vip_callback.sh is mounted at /usr/local/bin and made executable
  # ===========================================================================
  patroni-node1:
    <<: *patroni-common
    container_name: prb-04-node1
    hostname: patroni-node1
    environment:
      <<: *patroni-env
      PATRONI_NAME: patroni-node1
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-node1:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-node1:5432
    volumes:
      - ./config/patroni.yml:/etc/patroni/patroni.yml:ro
      - ./config/vip_callback.sh:/usr/local/bin/vip_callback.sh:ro
      - ./config/vip_post_init.sh:/usr/local/bin/vip_post_init.sh:ro
      - pg_logs_node1:/var/log/postgresql
    networks:
      - bench
      - dashboard

  patroni-node2:
    <<: *patroni-common
    container_name: prb-04-node2
    hostname: patroni-node2
    environment:
      <<: *patroni-env
      PATRONI_NAME: patroni-node2
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-node2:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-node2:5432
    volumes:
      - ./config/patroni.yml:/etc/patroni/patroni.yml:ro
      - ./config/vip_callback.sh:/usr/local/bin/vip_callback.sh:ro
      - ./config/vip_post_init.sh:/usr/local/bin/vip_post_init.sh:ro
      - pg_logs_node2:/var/log/postgresql
    networks:
      - bench
      - dashboard

  patroni-node3:
    <<: *patroni-common
    container_name: prb-04-node3
    hostname: patroni-node3
    environment:
      <<: *patroni-env
      PATRONI_NAME: patroni-node3
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-node3:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-node3:5432
    volumes:
      - ./config/patroni.yml:/etc/patroni/patroni.yml:ro
      - ./config/vip_callback.sh:/usr/local/bin/vip_callback.sh:ro
      - ./config/vip_post_init.sh:/usr/local/bin/vip_post_init.sh:ro
      - pg_logs_node3:/var/log/postgresql
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # Client: Heartbeat Traffic Generator (connects to VIP)
  # ===========================================================================
  client:
    build:
      context: ../../../tool/clients/failover
    container_name: prb-04-client
    environment:
      PG_CONNSTRING: "host=172.31.0.100 port=5432 dbname=postgres user=postgres password=postgres connect_timeout=5"
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "04-vip-patroni-callback"
      TEST_RUN_ID: ""  # Set by runner script
      INTERVAL_MS: "100"
    user: "0"
    entrypoint: >
      sh -c "
        echo 1000 > /proc/sys/net/ipv4/neigh/eth0/base_reachable_time_ms;
        echo 1 > /proc/sys/net/ipv4/neigh/eth0/gc_stale_time;
        exec python3 /app/heartbeat.py
      "
    cap_add:
      - NET_ADMIN
    privileged: true
    depends_on:
      - patroni-node1
      - patroni-node2
      - patroni-node3
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # Observer Agents: Patroni REST API watchers (all 3 nodes in one container)
  # ===========================================================================
  observer-patroni:
    build:
      context: ../../../tool/observers
    container_name: prb-04-obs-patroni
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: patroni
      WATCHER_TARGETS: "patroni-node1:http://patroni-node1:8008,patroni-node2:http://patroni-node2:8008,patroni-node3:http://patroni-node3:8008"
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "04-vip-patroni-callback"
    depends_on:
      - patroni-node1
      - patroni-node2
      - patroni-node3
    networks:
      - bench
      - dashboard

  observer-consul:
    build:
      context: ../../../tool/observers
    container_name: prb-04-obs-consul
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: consul
      CONSUL_URL: http://consul-server:8500
      CONSUL_SCOPE: bench
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "04-vip-patroni-callback"
      NODE_NAME: consul-server
    depends_on:
      consul-server:
        condition: service_healthy
    networks:
      - bench
      - dashboard

  # ===========================================================================
  # Observer Agents: VIP state watchers (share each node's network namespace
  # so they can run `ip addr show eth0` and detect VIP bind/unbind events)
  # ===========================================================================
  observer-vip-node1:
    build:
      context: ../../../tool/observers
    container_name: prb-04-obs-vip1
    network_mode: "service:patroni-node1"
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: vip
      VIP_ADDRESS: "172.31.0.100"
      VIP_INTERFACE: eth0
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "04-vip-patroni-callback"
      NODE_NAME: patroni-node1
    depends_on:
      - patroni-node1

  observer-vip-node2:
    build:
      context: ../../../tool/observers
    container_name: prb-04-obs-vip2
    network_mode: "service:patroni-node2"
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: vip
      VIP_ADDRESS: "172.31.0.100"
      VIP_INTERFACE: eth0
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "04-vip-patroni-callback"
      NODE_NAME: patroni-node2
    depends_on:
      - patroni-node2

  observer-vip-node3:
    build:
      context: ../../../tool/observers
    container_name: prb-04-obs-vip3
    network_mode: "service:patroni-node3"
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: vip
      VIP_ADDRESS: "172.31.0.100"
      VIP_INTERFACE: eth0
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "04-vip-patroni-callback"
      NODE_NAME: patroni-node3
    depends_on:
      - patroni-node3

  # ===========================================================================
  # Observer Agent: PostgreSQL log watcher (all 3 nodes in one container)
  # Three pg_logs volumes are mounted at distinct paths so WATCHER_TARGETS
  # can point each per-node thread at its own log file.
  # ===========================================================================
  observer-postgres:
    build:
      context: ../../../tool/observers
    container_name: prb-04-obs-pg
    environment:
      <<: *observer-env
      OBSERVER_COMPONENT: postgres
      WATCHER_TARGETS: "patroni-node1:host=patroni-node1 port=5432 dbname=postgres user=postgres password=postgres,patroni-node2:host=patroni-node2 port=5432 dbname=postgres user=postgres password=postgres,patroni-node3:host=patroni-node3 port=5432 dbname=postgres user=postgres password=postgres"
      TIMESCALE_CONNSTRING: "host=prb-timescaledb port=5432 dbname=bench user=bench password=bench"
      COMBINATION_ID: "04-vip-patroni-callback"
    depends_on:
      - patroni-node1
      - patroni-node2
      - patroni-node3
    networks:
      - bench
      - dashboard

volumes:
  consul_data:
  pg_logs_node1:
  pg_logs_node2:
  pg_logs_node3:

networks:
  bench:
    name: prb-04-bench
    ipam:
      config:
        - subnet: 172.31.0.0/24
  dashboard:
    external: true
    name: prb-dashboard

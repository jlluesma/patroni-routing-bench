###############################################################################
# patroni-routing-bench: HAProxy Configuration
# Combination 08 — consul-template Runtime API (zero-reload)
#
# This is a STATIC config — consul-template never rewrites or reloads it.
# Instead, consul-template detects leader changes and sends Runtime API
# commands via the admin socket to flip individual server states between
# "ready" (accepts traffic) and "maint" (maintenance, no traffic).
#
# The stats socket is the key difference from combo 06. HAProxy exposes a
# Unix socket at /var/run/haproxy/admin.sock that accepts admin commands:
#   set server primary_backend/patroni-node1 state ready
#   set server primary_backend/patroni-node1 state maint
#
# HAProxy's own httpchk health checks still run on servers in "ready" state
# and provide a second layer of validation: even if consul-template marks a
# node ready, HAProxy will route to it only if GET /primary returns 200.
###############################################################################

global
    maxconn 1000
    log stdout format raw local0
    stats socket /var/run/haproxy/admin.sock mode 660 level admin

defaults
    mode tcp
    log global
    option log-health-checks
    retries 3
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout check 2s

# ---------------------------------------------------------------------------
# Stats & Prometheus endpoint
# ---------------------------------------------------------------------------
frontend stats
    bind *:8404
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends

# ---------------------------------------------------------------------------
# Primary (read-write) — port 5000
# Routes to whichever node responds 200 on /primary AND is in state ready
# ---------------------------------------------------------------------------
frontend primary_frontend
    bind *:5000
    default_backend primary_backend

backend primary_backend
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions

    server patroni-node1 patroni-node1:5432 check port 8008
    server patroni-node2 patroni-node2:5432 check port 8008
    server patroni-node3 patroni-node3:5432 check port 8008

# ---------------------------------------------------------------------------
# Replicas (read-only) — port 5001
# consul-template does not manage replica_backend via Runtime API.
# HAProxy's own /replica health checks drive this backend.
# ---------------------------------------------------------------------------
frontend replica_frontend
    bind *:5001
    default_backend replica_backend

backend replica_backend
    option httpchk GET /replica
    http-check expect status 200
    balance roundrobin
    default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions

    server patroni-node1 patroni-node1:5432 check port 8008
    server patroni-node2 patroni-node2:5432 check port 8008
    server patroni-node3 patroni-node3:5432 check port 8008

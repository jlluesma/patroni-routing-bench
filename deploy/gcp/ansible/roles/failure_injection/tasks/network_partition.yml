---
# partition_jump: DROP (silent — peer waits for TCP timeout, models a real dead
# link or cloud security-group block) vs REJECT (active RST/ICMP — peer learns
# immediately). DROP is the correct, realistic default for partition benchmarks.

- name: "Network partition — full isolation from cluster subnet"
  when: partition_mode == "full"
  block:
    # --- Preserve rules: inserted BEFORE the broad DROP so they take effect first.
    # These keep the control/SSH path alive so the node stays recoverable without
    # GCP serial-console access. They do NOT exempt Patroni/Consul/PG ports between
    # cluster peers — all cluster traffic is still dropped by the rules below.

    - name: Preserve established/related connections (INPUT)
      ansible.builtin.iptables:
        chain: INPUT
        ctstate:
          - ESTABLISHED
          - RELATED
        jump: ACCEPT
        action: insert
        rule_num: 1
        comment: "patroni-bench: preserve"
      become: true

    - name: Preserve established/related connections (OUTPUT)
      ansible.builtin.iptables:
        chain: OUTPUT
        ctstate:
          - ESTABLISHED
          - RELATED
        jump: ACCEPT
        action: insert
        rule_num: 1
        comment: "patroni-bench: preserve"
      become: true

    - name: Preserve management ports inbound (new connections)
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ item | string }}"
        jump: ACCEPT
        action: insert
        rule_num: 1
        comment: "patroni-bench: preserve"
      become: true
      loop: "{{ partition_preserve_ports }}"

    - name: Preserve management IPs (INPUT)
      ansible.builtin.iptables:
        chain: INPUT
        source: "{{ item }}"
        jump: ACCEPT
        action: insert
        rule_num: 1
        comment: "patroni-bench: preserve"
      become: true
      loop: "{{ partition_preserve_ips }}"
      when: partition_preserve_ips | length > 0

    - name: Preserve management IPs (OUTPUT)
      ansible.builtin.iptables:
        chain: OUTPUT
        destination: "{{ item }}"
        jump: ACCEPT
        action: insert
        rule_num: 1
        comment: "patroni-bench: preserve"
      become: true
      loop: "{{ partition_preserve_ips }}"
      when: partition_preserve_ips | length > 0

    # --- Drop rules: block all cluster traffic after the preserve rules ---

    - name: Drop all inbound cluster traffic
      ansible.builtin.iptables:
        chain: INPUT
        source: "{{ cluster_subnet }}"
        jump: "{{ partition_jump }}"
        comment: "patroni-bench: network partition"
      become: true

    - name: Drop all outbound cluster traffic
      ansible.builtin.iptables:
        chain: OUTPUT
        destination: "{{ cluster_subnet }}"
        jump: "{{ partition_jump }}"
        comment: "patroni-bench: network partition"
      become: true

    - name: Full partition applied
      debug:
        msg: >
          Node {{ inventory_hostname }} fully isolated from {{ cluster_subnet }}.
          Consul session will expire after TTL (~30s).
          Recovery: ansible-playbook inject.yml -e scenario=network_partition -e recover=true -l {{ inventory_hostname }}

- name: "Network partition — asymmetric (block specific peers only)"
  when: partition_mode == "asymmetric"
  block:
    - name: Drop inbound from specific peers
      ansible.builtin.iptables:
        chain: INPUT
        source: "{{ item }}"
        jump: "{{ partition_jump }}"
        comment: "patroni-bench: asymmetric partition from {{ item }}"
      become: true
      loop: "{{ partition_block_ips }}"

    - name: Drop outbound to specific peers
      ansible.builtin.iptables:
        chain: OUTPUT
        destination: "{{ item }}"
        jump: "{{ partition_jump }}"
        comment: "patroni-bench: asymmetric partition to {{ item }}"
      become: true
      loop: "{{ partition_block_ips }}"

    - name: Asymmetric partition applied
      debug:
        msg: >
          Node {{ inventory_hostname }} blocked from: {{ partition_block_ips | join(', ') }}.
          Still reachable from other cluster members.
          Recovery: ansible-playbook inject.yml -e scenario=network_partition -e recover=true -l {{ inventory_hostname }}

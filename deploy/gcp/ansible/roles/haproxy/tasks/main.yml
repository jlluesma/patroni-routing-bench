---
- name: Verify routing_combo is supported by the GCP deployment
  ansible.builtin.fail:
    msg: "routing_combo '{{ routing_combo }}' is not implemented in deploy/gcp yet"
  when: routing_combo not in ['06-haproxy-rest-polling', '06-haproxy-rest-polling-tuned', '07-consul-template-reload', '08-consul-template-runtime-api']

- name: Install HAProxy
  apt:
    name: haproxy
    state: present

- name: Create HAProxy runtime directory
  file:
    path: /var/run/haproxy
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0750"

- name: Include combo-specific HAProxy configuration
  ansible.builtin.include_tasks: "combo-06.yml"
  when: routing_combo in ['06-haproxy-rest-polling', '06-haproxy-rest-polling-tuned']

- name: Include combo 07 configuration (consul-template + HAProxy reload)
  ansible.builtin.include_tasks: "combo-07.yml"
  when: routing_combo == '07-consul-template-reload'

- name: Include combo 08 configuration (consul-template Runtime API)
  ansible.builtin.include_tasks: "combo-08.yml"
  when: routing_combo == '08-consul-template-runtime-api'

- name: Enable and start HAProxy
  service:
    name: haproxy
    state: started
    enabled: true

- name: Set initial HAProxy server states via consul-template (combo 08)
  command: /usr/local/bin/consul-template -config=/etc/consul-template/consul-template.hcl -once
  when: routing_combo == '08-consul-template-runtime-api'

- name: Enable and start consul-template
  service:
    name: consul-template
    state: started
    enabled: true
  when: routing_combo in ['07-consul-template-reload', '08-consul-template-runtime-api']

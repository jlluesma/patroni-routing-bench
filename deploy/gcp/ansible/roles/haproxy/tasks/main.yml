---
- name: Verify routing_combo is supported by the GCP deployment
  ansible.builtin.fail:
    msg: "routing_combo '{{ routing_combo }}' is not implemented in deploy/gcp yet"
  when: routing_combo not in ['06-haproxy-rest-polling', '06-haproxy-rest-polling-tuned']

- name: Install HAProxy
  apt:
    name: haproxy
    state: present

- name: Create HAProxy runtime directory
  file:
    path: /var/run/haproxy
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0750"

- name: Include combo-specific HAProxy configuration
  ansible.builtin.include_tasks: "combo-06.yml"
  when: routing_combo in ['06-haproxy-rest-polling', '06-haproxy-rest-polling-tuned']

- name: Enable and start HAProxy
  service:
    name: haproxy
    state: started
    enabled: true

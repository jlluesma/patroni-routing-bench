---
# observer.yml — manage the tool stack and reports on the observer VM
#
# Required vars:
#   obs_action — start | start-client | stop | query | logs | truncate |
#                generate-report | download-report
#
# Optional vars:
#   batch_dir   — subdirectory under tool/results/ (default: latest)
#   sql         — SQL query string (required for obs_action=query)
#   container   — container name (required for obs_action=logs)
#
# Examples:
#   ansible-playbook -i inventory/gcp.ini observer.yml -e obs_action=start
#   ansible-playbook -i inventory/gcp.ini observer.yml -e obs_action=start-client
#   ansible-playbook -i inventory/gcp.ini observer.yml -e obs_action=stop
#   ansible-playbook -i inventory/gcp.ini observer.yml -e obs_action=truncate
#   ansible-playbook -i inventory/gcp.ini observer.yml -e obs_action=query \
#       -e "sql=SELECT * FROM failover_window ORDER BY first_failure DESC LIMIT 5;"
#   ansible-playbook -i inventory/gcp.ini observer.yml -e obs_action=logs \
#       -e container=prb-obs-patroni
#   ansible-playbook -i inventory/gcp.ini observer.yml -e obs_action=generate-report
#   ansible-playbook -i inventory/gcp.ini observer.yml -e obs_action=download-report
#   ansible-playbook -i inventory/gcp.ini observer.yml \
#       -e obs_action=generate-report -e batch_dir=batch_20260429_220606

- name: Observer VM operations
  hosts: observer
  become: true
  vars:
    tool_dir: "{{ repo_dest }}/tool"

  tasks:
    # --- Stack lifecycle ---

    - name: Copy .env.gcp to .env
      copy:
        src: "{{ tool_dir }}/.env.gcp"
        dest: "{{ tool_dir }}/.env"
        remote_src: true
        owner: deploy
        group: deploy
        mode: "0640"
      when: obs_action == "start"

    - name: Start observer stack
      shell: docker compose --profile haproxy up -d
      args:
        chdir: "{{ tool_dir }}"
      when: obs_action == "start"

    - name: Wait for TimescaleDB to be ready
      shell: docker exec prb-tsdb pg_isready -U bench
      register: tsdb_ready
      retries: 10
      delay: 2
      until: tsdb_ready.rc == 0
      when: obs_action == "start"

    - name: Apply TimescaleDB views
      shell: >
        docker cp {{ tool_dir }}/timescaledb/schema/003_create_views.sql prb-tsdb:/tmp/
        && docker exec prb-tsdb psql -U bench -f /tmp/003_create_views.sql
      args:
        chdir: "{{ tool_dir }}"
      when: obs_action == "start"

    - name: Start heartbeat client
      shell: docker compose --profile failover up -d
      args:
        chdir: "{{ tool_dir }}"
      when: obs_action == "start-client"

    - name: Stop observer stack
      shell: docker compose --profile failover --profile haproxy down
      args:
        chdir: "{{ tool_dir }}"
      when: obs_action == "stop"

    # --- Observability ---

    - name: Show container logs
      shell: "docker logs {{ container }} --tail 50"
      register: log_output
      when: obs_action == "logs"

    - name: Display container logs
      debug:
        msg: "{{ log_output.stdout_lines }}"
      when: obs_action == "logs"

    - name: Run SQL query against TimescaleDB
      shell: "docker exec prb-tsdb psql -U bench -c '{{ sql }}'"
      register: query_result
      when: obs_action == "query" and sql is defined

    - name: Show query result
      debug:
        msg: "{{ query_result.stdout_lines }}"
      when: obs_action == "query"

    # --- Data management ---

    - name: Truncate event tables (clean slate before next batch)
      shell: "docker exec prb-tsdb psql -U bench -c 'TRUNCATE observer_events, client_events, test_runs CASCADE;'"
      when: obs_action == "truncate"

    # --- Report generation ---

    - name: Generate batch report
      shell: >
        docker compose --profile charts run --rm charts
        db-report
        --output /results/batch_report.html
      args:
        chdir: "{{ tool_dir }}"
      when: obs_action == "generate-report"

    # --- Report download ---

    - name: Create local results directory
      delegate_to: localhost
      become: false
      file:
        path: "{{ playbook_dir }}/../results"
        state: directory
      when: obs_action == "download-report"

    - name: Download batch report
      fetch:
        src: "{{ tool_dir }}/results/batch_report.html"
        dest: "{{ playbook_dir }}/../results/batch_report.html"
        flat: yes
      when: obs_action == "download-report"

    - name: Report downloaded
      debug:
        msg: "Report saved to deploy/gcp/results/"
      when: obs_action == "download-report"

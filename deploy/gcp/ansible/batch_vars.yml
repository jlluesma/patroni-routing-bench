---
# Benchmark matrix. Edit this file to change what a batch run covers.

# Combos to run, in order. Each entry must match a file in combos/<id>.yml.
# NOTE: combo 07 installs a HAProxy master-worker systemd override that
# persists when 08/09 are deployed on the same cluster (site.yml re-renders
# config but does not remove the override). For a clean comparison, use one
# combo per fresh cluster. If running multiple combos on one cluster, keep
# 07 early so subsequent combos overwrite its HAProxy config cleanly.
batch_combos:
  - "06-haproxy-rest-polling"
  - "06-haproxy-rest-polling-tuned"
  - "07-consul-template-reload"
  - "08-consul-template-runtime-api"
  - "09-patroni-callback-haproxy"

# Scenarios to run for each combo, in order.
batch_scenarios:
  - hard_stop
  - hard_kill
  - switchover
  - network_partition

# Iterations per (combo, scenario) cell.
batch_iterations: 5

# Seconds to wait after the health gate passes before starting the next iteration.
batch_settle_seconds: 20

# Seconds inject.yml waits after failover to tag events (passed as post_wait).
batch_post_wait: 15

# Inventory file path, relative to deploy/gcp/ansible/.
batch_inventory: "inventory/gcp.ini"

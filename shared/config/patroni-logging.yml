# patroni-routing-bench: Shared PostgreSQL logging parameters
#
# All combinations should include these parameters in their patroni.yml
# under bootstrap.dcs.postgresql.parameters to ensure consistent, verbose
# logging for failover analysis.
#
# These settings capture connection lifecycle, replication commands,
# checkpoints, and general activity — the minimum needed to reconstruct
# the PostgreSQL-level failover timeline.

# Copy these into your patroni.yml bootstrap.dcs.postgresql.parameters:
logging_collector: "on"
log_directory: /var/log/postgresql
log_filename: postgresql.log
log_line_prefix: "%m [%p] %q%u@%d "
log_connections: "on"
log_disconnections: "on"
log_replication_commands: "on"
log_checkpoints: "on"
log_min_messages: info
log_statement: none
log_min_duration_statement: 1000

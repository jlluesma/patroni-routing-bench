# patroni-routing-bench: Shared HAProxy logging defaults
#
# All combinations using HAProxy should include these settings.
#
# In the 'global' section:
#   log stdout format raw local0
#
# In the 'defaults' section:
#   log global
#   option log-health-checks
#
# 'option log-health-checks' logs every health check state transition,
# which is critical for measuring HAProxy's failover detection delay
# (how long between primary failure and HAProxy marking it DOWN).
